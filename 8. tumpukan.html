<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Tumpukan Kotak</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f1f5f9;
      padding: 40px;
    }

    .wrapper {
      width: 400px;
      height: 250px;
      margin: 30px auto;
      position: relative; 
    }

    .kotak {
      width: 120px;
      height: 120px;
      color: white;
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    .merah { background: red;   top: 40px;  left: 40px;} 
    .hijau { background: green; top: 70px;  left: 90px;}
    .biru  { background: blue;  top: 100px; left: 140px;} 
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="kotak merah">Merah</div>
    <div class="kotak hijau">Hijau</div>
    <div class="kotak biru">Biru</div>
  </div>
</body>
</html>
