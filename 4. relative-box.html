<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Kotak Keluar</title>
  <style>
    .box {
        width: 120px;
        height: 120px;
        margin: 10px;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        font-weight: bold;
    }

    .box1 { 
        background: tomato; 
    }

    .box2 { 
        background: seagreen;
        position: relative;
        left: 50px;
        top: 30px;
    }

    .box3 { 
        background: steelblue; 
    }
  </style>
</head>
<body>
  <div class="box box1">Box 1</div>
  <div class="box box2">Box 2</div>
  <div class="box box3">Box 3</div>
</body>
</html>
