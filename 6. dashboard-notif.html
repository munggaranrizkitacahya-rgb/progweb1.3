<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Notifikasi Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f1f5f9;
      padding: 40px;
    }

    .dashboard {
      width: 600px;
      padding: 20px;
      border: 1px solid #999;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      position: relative;
    }

    .notif {
      background: orange;
      padding: 10px;
      position: absolute; 
      top: 16px;
      right: 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      color: white;
    }

    .dashboard h2 {
      font-size: 18px;
      color: #1e3a8a;
      margin-bottom: 8px;
    }

    .dashboard p {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="notif">Server hampir penuh</div>
    <h2>Dashboard Admin</h2>
    <p>Status sistem hari ini normal.</p>
  </div>
</body>
</html>
