<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Tooltip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .tooltip-box {
      display: inline-block;
      margin: 100px;
      position: relative; 
    }

    .tooltip-text {
      background: black;
      color: white;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      white-space: nowrap;

      position: absolute;   
      bottom: calc(100% + 8px); 
      left: 50%;
      transform: translateX(-50%); 

      opacity: 0;           
      pointer-events: none;
      transition: opacity .2s;
    }

    .tooltip-text::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: black;
    }

    .tooltip-box:hover .tooltip-text {
      opacity: 1;
    }

    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="tooltip-box">
    <span class="tooltip-text">Klik untuk melihat petunjuk</span>
    <button>Bantuan</button>
  </div>
</body>
</html>
