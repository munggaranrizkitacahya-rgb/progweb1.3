<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Badge Notifikasi</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
    }

    .card {
      width: 300px;
      padding: 16px;
      border: 1px solid #ccc;
      background: white;
      border-radius: 10px;
      position: relative; 
    }

    .badge {
      background: crimson;
      color: white;
      padding: 6px 10px;
      position: absolute; 
      top: 0;
      right: 0;
      border-radius: 0 10px 0 10px;
      font-size: 12px;
      font-weight: bold;
    }

    .card img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .card h3 { margin: 0 0 6px; font-size: 15px; color: #111; }
    .card p  { margin: 0; font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Diskon 20%</span>
    <img src="https://i.pinimg.com/736x/8d/53/04/8d53048c0f6e40d5f79809c67d9549d0.jpg" alt="Sepatu Casual" />
    <h3>Sepatu Casual</h3>
    <p>Sepatu nyaman untuk kegiatan harian.</p>
  </div>
</body>
</html>
