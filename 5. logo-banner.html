<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Logo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #efe8ee;
      padding: 40px 32px;
    }

    .banner {
      width: 700px;
      position: relative;
    }

    .banner img {
      max-width: 100%;
      display: block;
      border-radius: 16px;
    }

    .logo {
      width: 80px;
      height: 80px;
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      object-fit: contain;
      padding: 8px;
    }
  </style>
</head>
<body>
  <div class="banner">
    <img src="https://i.pinimg.com/1200x/cf/fa/2b/cffa2bc9ec18bcf11407d8448f12e59f.jpg" alt="Banner Promo" />
    <img src="https://i.pinimg.com/1200x/2e/da/34/2eda342803c0ab32d73ec81a389fb35f.jpg" alt="Logo" class="logo" />
  </div>
</body>
</html>
